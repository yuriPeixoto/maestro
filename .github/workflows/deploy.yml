name: Deploy Maestro

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build e Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar PATH (Go)
        run: echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Build agent (Go)
        working-directory: agent
        run: |
          mkdir -p ../dist
          go build -o ../dist/maestro-agent ./cmd/agent

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Deploy agent
        run: install -m 755 dist/maestro-agent /opt/maestro/agent/maestro-agent

      - name: Deploy API
        run: |
          rsync -av --delete --exclude='.venv' --exclude='.env' api/ /opt/maestro/api/
          python3.14 -m venv /opt/maestro/api/.venv
          /opt/maestro/api/.venv/bin/pip install -r /opt/maestro/api/requirements.txt

      - name: Executar migrations ClickHouse
        run: |
          CH_PASS=$(grep -Po '(?<=MAESTRO_CLICKHOUSE_PASSWORD=).+' /opt/maestro/api/.env)
          for f in migrations/*.sql; do
            echo "Running migration: $f"
            clickhouse-client --password "$CH_PASS" --multiquery < "$f"
          done

      - name: Deploy frontend
        run: rsync -av --delete frontend/dist/ /opt/maestro/frontend/

      - name: Reiniciar serviços
        run: |
          sudo /usr/bin/systemctl restart maestro-api
          sudo /usr/bin/systemctl restart maestro-agent
